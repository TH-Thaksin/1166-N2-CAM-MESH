<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hướng dẫn Lập HĐ Camera & Mesh Wifi - VNPT</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      color: #222;
      line-height: 1.7;
    }
    header {
      background: linear-gradient(135deg, #c00 0%, #e63030 100%);
      color: #fff;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header .logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 2px;
      background: #fff;
      color: #c00;
      padding: 4px 12px;
      border-radius: 6px;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.3;
    }
    header p { font-size: 0.85rem; opacity: 0.85; margin-top: 2px; }
    .container {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px 64px;
    }
    #content {
      background: #fff;
      border-radius: 10px;
      padding: 40px 48px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    #content h1 { font-size: 1.7rem; color: #c00; margin-bottom: 8px; }
    #content h2 {
      font-size: 1.2rem;
      color: #c00;
      border-left: 4px solid #c00;
      padding-left: 12px;
      margin: 32px 0 14px;
    }
    #content h3 {
      font-size: 1.05rem;
      color: #333;
      margin: 20px 0 10px;
      font-weight: 700;
    }
    #content h4 { font-size: 0.98rem; color: #555; margin: 16px 0 8px; }
    #content p { margin: 8px 0; }
    #content ul, #content ol { margin: 8px 0 8px 24px; }
    #content li { margin: 4px 0; }
    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 0.88rem;
    }
    #content th {
      background: #c00;
      color: #fff;
      padding: 8px 12px;
      text-align: left;
    }
    #content td {
      padding: 7px 12px;
      border-bottom: 1px solid #eee;
    }
    #content tr:nth-child(even) td { background: #fafafa; }
    #content tr:hover td { background: #fff5f5; }
    #content code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: monospace;
    }
    #content pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 12px 0;
    }
    #content pre code { background: none; padding: 0; }
    #content blockquote {
      border-left: 4px solid #e63030;
      background: #fff5f5;
      padding: 10px 16px;
      margin: 14px 0;
      border-radius: 0 6px 6px 0;
      color: #b00;
    }
    #content hr {
      border: none;
      border-top: 2px solid #eee;
      margin: 28px 0;
    }
    #content strong { color: #c00; }
    .loading {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 1rem;
    }
    footer {
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      padding: 16px;
    }
    @media (max-width: 600px) {
      #content { padding: 20px 16px; }
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">VNPT</div>
    <div>
      <h1>Hướng dẫn Lập Hợp đồng — Camera & Mesh Wifi</h1>
      <p>Hệ thống OneBSS · Tài liệu đào tạo nội bộ</p>
    </div>
  </header>
  <div class="container">
    <div id="content">
      <div class="loading">Đang tải tài liệu...</div>
    </div>
  </div>
  <footer>VNPT · Tài liệu nội bộ · Cập nhật 2026</footer>
  <script>
    fetch('./TOM_TAT_NOI_DUNG.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById('content').innerHTML =
          '<p style="color:red">Không tải được tài liệu. Vui lòng thử lại.</p>';
      });
  </script>
</body>
</html>
